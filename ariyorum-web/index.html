<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arıyorum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e12;
      color: #f0f0f5;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 400px; }
    .logo {
      width: 80px;
      height: 80px;
      background: #f0c040;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 800;
      color: #000;
      margin: 0 auto 24px;
    }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    h1 span { color: #f0c040; }
    p { color: #888; font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: #f0c040;
      color: #000;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
      margin: 8px;
    }
    .btn.secondary {
      background: transparent;
      color: #f0c040;
      border: 2px solid #f0c040;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">A</div>
    <h1>Arı<span>yorum</span></h1>
    <p>Ne aradığını yayınla, satıcılar seni bulsun.</p>
    <a href="https://play.google.com/store/apps/details?id=com.ariyorum.app" class="btn">
      Google Play'den İndir
    </a>
    <a href="https://apps.apple.com/app/ariyorum/id000000000" class="btn secondary">
      App Store'dan İndir
    </a>
  </div>
</body>
</html>
